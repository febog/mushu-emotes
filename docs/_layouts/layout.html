<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta name="description"
        content="Small website that summarizes the Twitch emotes from different extensions enabled in Mushu's channel.">

  <!-- Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
        crossorigin="anonymous">

  <style type="text/css">
    .emote-thumbnail {
      height: 100%;
      max-height: 32px;
    }
  </style>
  <title>{{ page.title }}</title>
</head>

<body>
  <div class="container mt-4">
    {{ content }}

    <hr />

    <p>
      <small>
        Website maintained with ♥ by <a href="https://febog.com">febog</a>. Source can be found on <a href="https://github.com/febog/mushu-emotes">GitHub</a>.
      </small>
    </p>
    <!-- Container end -->
  </div>

  <!-- Scripts -->
  <script type="module">
    import { filterTable } from "https://cdn.jsdelivr.net/npm/@febog/table-filter@1.0.0/filter.js";
    const input = document.getElementById("table-search-input");
    input.addEventListener("input", e => filterTable("emote-table", e.target.value, "visible-emotes-counter"));
  </script>
</body>

</html>
